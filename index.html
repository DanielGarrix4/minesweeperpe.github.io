<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minesweeper Pocket Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1 class="pocket-title">MINESWEEPER <span class="edition">POCKET EDITION</span></h1>
            <div class="stats-bar">
                <div class="stat">888<span class="value" id="mine-count">000</span></div>
                <div class="stat">888<span class="value" id="timer">000</span></div>
            </div>
        </header>

        <div id="board" class="board"></div>

        <footer class="controls">
            <button id="reset-btn" class="pocket-btn" title="Reiniciar">RESET</button>
            <div class="mode-toggle">
                <span id="mode-label">🚩</span>
                <label class="switch">
                    <input type="checkbox" id="flag-mode">
                    <span class="slider round"></span>
                </label>
            </div>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
